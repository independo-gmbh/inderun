# SwiftLint configuration for the IndeRun Swift package.
included:
  - Sources
excluded:
  - .build
  # Generated by quicktype from the shared JSON schemas — not hand-maintained.
  - Sources/IndeRunContracts/Contracts.swift

disabled_rules:
  - todo
  # Structural size rules are noisy for the generated-adjacent and engine files;
  # revisit once modules are split further.
  - file_length
  - type_body_length
  - function_body_length
  - cyclomatic_complexity

line_length:
  warning: 140
  error: 200

identifier_name:
  min_length: 1

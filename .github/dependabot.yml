version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Wait before proposing a freshly published version. Keep this >= the pnpm
    # `minimumReleaseAge` supply-chain policy so Dependabot PRs don't trip the
    # lockfile age check in CI.
    cooldown:
      default-days: 7
    groups:
      github-actions-routine:
        patterns:
          - "*"
        update-types:
          - minor
          - patch


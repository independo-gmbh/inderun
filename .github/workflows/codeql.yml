name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1" # weekly full scan, matching prior default-setup cadence

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.language == 'swift' && 'macos-latest' || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: rust
            build-mode: none
          - language: java-kotlin
            build-mode: manual
          - language: swift
            build-mode: manual
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      # java-kotlin manual build needs the same toolchain as android.yml
      - name: Set up Java 21
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        if: matrix.language == 'java-kotlin'
        uses: android-actions/setup-android@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      # Explicit Gradle build of all Android modules (debug variant, no release
      # signing, tests skipped), instead of letting autobuild guess a target.
      - name: Build Android modules
        if: matrix.language == 'java-kotlin'
        working-directory: android
        run: ./gradlew assembleDebug

      # Fast manual Swift build of the SwiftPM library targets, replacing the
      # autobuilder (which picks the ios/SampleApps demo xcodeproj and fails).
      # The SwiftPM manifest lives at the repository root (sources under ios/IndeRun).
      - name: Build Swift package
        if: matrix.language == 'swift'
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.37.0
        with:
          category: "/language:${{ matrix.language }}"

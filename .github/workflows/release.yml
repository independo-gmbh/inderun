name: Release

on:
  push:
    branches:
      - main
      - dev

# Prevent overlapping releases on the same branch.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create GitHub releases + push the version/changelog commit
      issues: write # comment on released issues
      pull-requests: write # comment on released PRs
      id-token: write # OIDC for npm Trusted Publishing + provenance

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # semantic-release needs full history + tags
          persist-credentials: true
          # Use a PAT/App token (GH_TOKEN) so semantic-release can push the
          # version/changelog commit + tag to protected main and back-merge to
          # dev. Falls back to the default token if GH_TOKEN is not set.
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up pnpm 11.9.0
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # Keep npm current: OIDC Trusted Publishing + provenance need npm >= 11.5.
      - name: Update npm
        run: npm i -g npm@^11

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo state
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            rust/inderun-route-core -> target
          cache-on-failure: true

      - name: Cache wasm-bindgen CLI
        id: cache-wasm-bindgen
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/wasm-bindgen
            ~/.cargo/bin/wasm-bindgen-test-runner
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-wasm-bindgen-cli-0.2.125

      - name: Install wasm-bindgen CLI
        if: steps.cache-wasm-bindgen.outputs.cache-hit != 'true'
        run: cargo install wasm-bindgen-cli --version 0.2.125 --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate contracts
        run: pnpm generate:code

      - name: Build Rust WASM bindings
        run: |
          RUSTC="$(rustup which rustc --toolchain stable)" \
            rustup run stable cargo build -p inderun_route_core --target wasm32-unknown-unknown

          wasm-bindgen target/wasm32-unknown-unknown/debug/inderun_route_core.wasm \
            --target web \
            --out-dir packages/inderun-route-core-wasm/generated \
            --out-name inderun_route_core

      - name: Build workspace
        run: pnpm build

      - name: Test workspace (JS)
        run: pnpm test:js

      - name: Semantic Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

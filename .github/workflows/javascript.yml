name: JavaScript

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  javascript:
    name: JavaScript
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm 11.9.0
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo state
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            rust/inderun-route-core -> target
          cache-on-failure: true

      - name: Cache wasm-bindgen CLI
        id: cache-wasm-bindgen
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/wasm-bindgen
            ~/.cargo/bin/wasm-bindgen-test-runner
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: ${{ runner.os }}-wasm-bindgen-cli-0.2.125

      - name: Install wasm-bindgen CLI
        if: steps.cache-wasm-bindgen.outputs.cache-hit != 'true'
        run: cargo install wasm-bindgen-cli --version 0.2.125 --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate contracts
        run: pnpm generate

      - name: Build Rust WASM bindings
        run: |
          RUSTC="$(rustup which rustc --toolchain stable)" \
            rustup run stable cargo build -p inderun_route_core --target wasm32-unknown-unknown

          wasm-bindgen target/wasm32-unknown-unknown/debug/inderun_route_core.wasm \
            --target web \
            --out-dir packages/inderun-route-core-wasm/generated \
            --out-name inderun_route_core

      - name: Build workspace
        run: pnpm build

      - name: Test workspace
        run: pnpm test

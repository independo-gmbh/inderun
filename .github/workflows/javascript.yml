name: JavaScript

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  javascript:
    name: JavaScript
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm 11.9.0
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
          run_install: false

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.125 --locked

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate contracts
        run: pnpm generate

      - name: Build Rust WASM bindings
        run: |
          RUSTC="$(rustup which rustc --toolchain stable)" \
            rustup run stable cargo build -p inderun_route_core --target wasm32-unknown-unknown

          wasm-bindgen target/wasm32-unknown-unknown/debug/inderun_route_core.wasm \
            --target web \
            --out-dir packages/inderun-route-core-wasm/generated \
            --out-name inderun_route_core

      - name: Build workspace
        run: pnpm build

      - name: Test workspace
        run: pnpm test
